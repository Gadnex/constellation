<article>
    <h2>Forms</h2>
    <p>
        Here is an example form with the different stules
    </p>
    <form action="#" class="container">
        <fieldset>
            <legend>Input fields</legend>
            <div>
                <label>
                    Text
                    <input type="text" placeholder="Placeholder">
                </label>
            </div>
            <div>
                <label>
                    Disabled input
                    <input type="text" placeholder="Disabled" aria-label="Disabled input" disabled>
                </label>
            </div>
            <div>
                <label>
                    Read-only input
                    <input type="text" value="Read-only" aria-label="Read-only input" readonly>
                </label>
            </div>
            <div>
                <label>
                    Valid input
                    <input type="text" aria-invalid="false" value='aria-invalid="false"'>
                </label>
            </div>
            <div>
                <label>
                    Invalid input
                    <input type="text" aria-invalid="true" value='aria-invalid="true"'>
                    <ul>
                        <li>Value is required</li>
                        <li>Must be at least 3 characters long</li>
                        <li>Must contain a number</li>
                    </ul>
                </label>
            </div>
            <div>
                <label>
                    Email
                    <input type="email">
                </label>
            </div>
            <div>
                <label>
                    Number
                    <input type="number">
                </label>
            </div>
            <div>
                <label>
                    Password
                    <input type="password">
                </label>
            </div>
            <div>
                <label>
                    Tel
                    <input type="tel">
                </label>
            </div>
            <div>
                <label>
                    Url
                    <input type="url">
                </label>
            </div>
            <div>
                <label>
                    Date
                    <input type="date" name="date" aria-label="Date">
                </label>
            </div>
            <div>
                <label>
                    Datetime-local
                    <input type="datetime-local" name="datetime-local" aria-label="Datetime local">
                </label>
            </div>
            <div>
                <label>
                    Month
                    <input type="month" name="month" aria-label="Month">
                </label>
            </div>
            <div>
                <label>
                    Time
                    <input type="time" name="time" aria-label="Time">
                </label>
            </div>
            <div>
                <label>
                    Search
                    <input type="search" name="search" placeholder="Search" aria-label="Search" />
                </label>
            </div>
            <div>
                <label>
                    Color
                    <input type="color" value="#00ffaa" aria-label="Color picker">
                </label>
            </div>
            <div>
                <label>
                    File
                    <input type="file">
                </label>
            </div>
        </fieldset>
        <div>
            <label>
                Textarea
                <textarea placeholder="Placeholder" aria-label="Placeholder"></textarea>
            </label>
        </div>
        <div>
            <label>
                Disabled textarea
                <textarea placeholder="Disabled" aria-label="Disabled textarea" disabled></textarea>
            </label>
        </div>
        <div>
            <label>
                Read-only textarea
                <textarea placeholder="Read-only" aria-label="Read-only textarea" readonly></textarea>
            </label>
        </div>
        <div>
            <label>
                Valid textarea
                <textarea placeholder='aria-invalid="false"' aria-invalid="false"></textarea>
            </label>
        </div>
        <div>
            <label>
                Invalid textarea
                <textarea placeholder='aria-invalid="true"' aria-invalid="true"></textarea>
                <ul>
                    <li>Value is required</li>
                    <li>Must be at least 30 characters long</li>
                </ul>
            </label>
        </div>
        <div>
            <label>
                Select
                <select id="pet-select">
                    <button>
                        <selectedcontent></selectedcontent>
                    </button>
                    <option value="">Please select a pet</option>
                    <option value="cat">
                        <span class="icon" aria-hidden="true">🐱</span><span class="option-label">Cat</span>
                    </option>
                    <option value="dog">
                        <span class="icon" aria-hidden="true">🐶</span><span class="option-label">Dog</span>
                    </option>
                    <option value="hamster">
                        <span class="icon" aria-hidden="true">🐹</span><span class="option-label">Hamster</span>
                    </option>
                    <option value="chicken">
                        <span class="icon" aria-hidden="true">🐔</span><span class="option-label">Chicken</span>
                    </option>
                    <option value="fish">
                        <span class="icon" aria-hidden="true">🐟</span><span class="option-label">Fish</span>
                    </option>
                    <option value="snake">
                        <span class="icon" aria-hidden="true">🐍</span><span class="option-label">Snake</span>
                    </option>
                </select>
            </label>
        </div>
        <div>
            <label>
                Select disabled
                <select disabled>
                    <option>Italian</option>
                </select>
            </label>
        </div>
        <div>
            <label>
                Select valid
                <select aria-invalid="false">
                    <option>aria-invalid="false"</option>
                </select>
            </label>
        </div>
        <div>
            <label>
                Select invalid
                <select aria-invalid="true">
                    <option>aria-invalid="true"</option>
                </select>
            </label>
        </div>
        <div>
            <label>
                Range
                <input type="range" />
            </label>
        </div>
        <fieldset>
            <legend>Checkboxes</legend>
            <div>
                <label>
                    <input type="checkbox" name="english" checked />
                    English
                </label>
            </div>
            <div>
                <label>
                    <input type="checkbox" name="french" checked />
                    French
                </label>
            </div>
            <div>
                <label>
                    <input type="checkbox" name="mandarin" />
                    Mandarin
                </label>
            </div>
            <div>
                <label>
                    <input type="checkbox" name="thai" />
                    Thai
                </label>
            </div>
            <div><label aria-disabled="true">
                    <input type="checkbox" name="dothraki" disabled />
                    Dothraki
                </label>
            </div>
        </fieldset>
        <fieldset>
            <legend>Radio buttons</legend>
            <div>
                <label>
                    <input type="radio" name="language" checked />
                    English
                </label>
            </div>
            <div>
                <label>
                    <input type="radio" name="language" />
                    French
                </label>
            </div>
            <div>
                <label>
                    <input type="radio" name="language" />
                    Mandarin
                </label>
            </div>
            <div>
                <label>
                    <input type="radio" name="language" />
                    Thai
                </label>
            </div>
            <div>
                <label aria-disabled="true">
                    <input type="radio" name="language" disabled />
                    Dothraki
                </label>
            </div>
        </fieldset>
        <fieldset class="flex-column">
            <legend>Fieldset flex-column</legend>
            <div>
                <label>
                    <input type="checkbox" name="english" checked />
                    English
                </label>
            </div>
            <div>
                <label>
                    <input type="checkbox" name="french" checked />
                    French
                </label>
            </div>
            <div>
                <label>
                    <input type="checkbox" name="mandarin" />
                    Mandarin
                </label>
            </div>
            <div>
                <label>
                    <input type="checkbox" name="thai" />
                    Thai
                </label>
            </div>
            <div><label aria-disabled="true">
                    <input type="checkbox" name="dothraki" disabled />
                    Dothraki
                </label>
            </div>
        </fieldset>
        <fieldset aria-invalid="false">
            <legend>Fieldset valid</legend>
            <div>
                <label>
                    <input type="checkbox" name="english" checked />
                    English
                </label>
            </div>
            <div>
                <label>
                    <input type="checkbox" name="french" checked />
                    French
                </label>
            </div>
            <div>
                <label>
                    <input type="checkbox" name="mandarin" />
                    Mandarin
                </label>
            </div>
            <div>
                <label>
                    <input type="checkbox" name="thai" />
                    Thai
                </label>
            </div>
            <div><label aria-disabled="true">
                    <input type="checkbox" name="dothraki" disabled />
                    Dothraki
                </label>
            </div>
        </fieldset>
        <fieldset aria-invalid="true">
            <legend>Fieldset invalid</legend>
            <div>
                <label>
                    <input type="checkbox" name="english" checked />
                    English
                </label>
            </div>
            <div>
                <label>
                    <input type="checkbox" name="french" checked />
                    French
                </label>
            </div>
            <div>
                <label>
                    <input type="checkbox" name="mandarin" />
                    Mandarin
                </label>
            </div>
            <div>
                <label>
                    <input type="checkbox" name="thai" />
                    Thai
                </label>
            </div>
            <div><label aria-disabled="true">
                    <input type="checkbox" name="dothraki" disabled />
                    Dothraki
                </label>
            </div>
        </fieldset>
        <footer>
            <button type="reset">Reset</button>
            <button type="submit">Submit</button>
        </footer>
    </form>
</article>
