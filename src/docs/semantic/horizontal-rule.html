<p>
    A horizontal rule creates a horizontal line that separates two logical sections of a document. 
</p>
<p>
    It is created using the <kbd>&lt;hr&gt;</kbd> element.
</p>
<div class="box">
    <span>Text above</span>
    <hr>

</div>
