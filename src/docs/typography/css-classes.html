---
title: CSS Classes
---
<p>
    Individual heading colors can also be set using the <code>primary</code>, <code>secondary</code>,
    <code>tertiary</code>, and <code>contrast</code> CSS classes. For example:
</p>
<div class="card">
    <h6 class="primary">Heading with class primary</h6>
    <h6 class="secondary">Heading with class secondary</h6>
    <h6 class="tertiary">Heading with class tertiary</h6>
    <h6 class="contrast">Heading with class contrast</h6>
</div>
